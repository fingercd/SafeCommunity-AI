# RTSP / 本地视频推理示例（需 train_end2end 导出的 checkpoint，内含 encoder + MIL）
rtsp_url: "rtsp://user:pass@ip:554/xxx"
camera_id: cam0
out_dir: lab_dataset/derived/realtime

artifacts:
  known_checkpoint: lab_dataset/derived/end2end_classifier/checkpoint_best.pt
  open_set_dir: ""

encoder:
  model_name: OpenGVLab/VideoMAEv2-Base
  device: auto
  use_half: false

sampling:
  clip_len: 12
  frame_stride: 2
  sample_fps: 5.0
  window_stride: 4

fusion:
  min_known_prob: 0.5
  known_alarm_prob: 0.5
  treat_low_conf_as_unknown: true
  unknown_alarm: true
  ranking_alarm_threshold: 0.5

outputs:
  save_snapshot: true
  api_url: ""
  api_timeout_sec: 3.0

runtime:
  min_consecutive: 1
  cooldown_sec: 3.0
  open_timeout_sec: 10.0
  reconnect_wait_sec: 3.0
  show: false
