# 复制自 default.yaml 后修改：2B 最小通道快速验证
# 使用前请将 model.name_or_path_2b 设为本地 Qwen3.5-VL-2B 目录，并设 lora_small: true

model:
  name_or_path: "C:/Users/Administrator/Desktop/moniter/vlm/Qwen"
  name_or_path_2b: "C:/Users/Administrator/Desktop/moniter/vlm/Qwen 3.5 2b"
  lora_small: true
  lora_r: 32
  lora_alpha_small: 64
  use_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  build_dataset_source: ecva
  ecva_root: "C:/Users/Administrator/Desktop/moniter/vlm/ECVA"
  ecva_metadata: "data/processed/ecva_metadata.jsonl"
  ecva_clips_dir: "data/processed/ecva_clips"
  ecva_clips_metadata: "data/processed/ecva_clips_metadata.jsonl"
  normal_annotations_path: "data/processed/annotations_normal.jsonl"
  normal_train_sample_size: 16
  normal_sample_seed: 42
  ucf_video_root: "C:/Users/Administrator/Desktop/Vit/lab_dataset/raw_videos"
  # 直接指向 normal 目录（内含多级子文件夹也可），避免再拼 raw_videos/normal
  ucf_normal_root: "C:/Users/Administrator/Desktop/Vit/lab_dataset/raw_videos/normal"
  use_smoke_clip_limits: true
  smoke_ecva_max_records: 40
  smoke_normal_ucf_max: 16
  clips_dir: "data/processed/clips"
  clips_metadata: "data/processed/clips_metadata.jsonl"
  annotations_path: "data/processed/annotations.jsonl"
  train_json: "data/processed/train.json"
  val_json: "data/processed/val.json"
  test_json: "data/processed/test.json"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

clips:
  num_clips_per_video: 8
  clip_len: 16
  frame_stride: 2
  max_pixel_area: 518400

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "outputs/qlora_2b"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  # OOM 时可改为 1536
  max_seq_length: 2048
  eval_strategy: no
  eval_steps: 500
  per_device_eval_batch_size: 1
  logging_first_step: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  report_to: []

inference:
  confidence_threshold: 0.7
  consecutive_anomaly_clips: 2
  max_tokens: 256
  temperature: 0.0
  # train/evaluate.py 未传 --batch_size 时使用
  eval_batch_size: 1
